name: Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static demo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build GitHub Pages demo
        run: python scripts/build_pages_demo.py --output site

      - name: Smoke test static demo
        run: |
          test -s site/index.html
          test -s site/static/styles.css
          test -s site/static/demo.js
          grep -q "IIR Filter Static Demo" site/index.html
          grep -q "design-source" site/index.html
          grep -q "infer-source" site/index.html
          grep -q "design-response-points" site/index.html
          grep -q "inference-response-points" site/index.html
          grep -q "Design Coefficients" site/index.html
          grep -q "pyodide/v0.29.3/full/pyodide.js" site/index.html

      - name: Verify static demo markup
        run: |
          python - <<'PY'
          from pathlib import Path

          html = Path("site/index.html").read_text(encoding="utf-8")
          forbidden = [
              "demo-data",
              "preset-list",
              "Biquad Bandpass",
              "Butterworth Lowpass",
              "Elliptic Notch",
              'start="0"',
              "json-toolbar",
          ]
          for text in forbidden:
              if text in html:
                  raise SystemExit(f"unexpected static demo markup: {text}")
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
